name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: ./npmw ci

      - name: Set version from tag
        run: npm version ${GITHUB_REF#refs/tags/v} --no-git-tag-version

      - name: Build
        run: ./npmw run build

      - name: Test
        run: ./npmw test

      - name: Publish
        run: ./npmw publish --tag latest
