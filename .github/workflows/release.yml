name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: ./npmw install

      - name: Build
        run: ./npmw run build

      - name: Test
        run: ./npmw test

      - name: Publish
        run: ./npmw publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
