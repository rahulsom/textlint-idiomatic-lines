name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ./npmw install

      - name: Build
        run: ./npmw run build

      - name: Lint
        run: ./npmw run lint

      - name: Test
        run: ./npmw test
